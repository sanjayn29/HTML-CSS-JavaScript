<!DOCTYPE html>
<html>
    <head>
        <title>Tables </title>
        <meta charset="UTF-8">
        <meta name="author" content="Sanjay N">
    </head>
    <body>
        <H1>Tables Tags And Examples</H1>
        <hr>
        <h2>Normal Table</h2>
        <table>
            <tr>
                <th>
                    Name
                </th>
                <th>
                    Roll no
                </th>
            </tr>
            <tr>
                <td>
                    Sanjay
                </td>
                <td>
                    123
                </td>
            </tr>
            <tr>
                <td>
                    Sandeep
                </td>
                <td>
                    456
                </td>
            </tr>

        </table>
        <hr>
        <h2>Adding More Border</h2>
        <table border="1">
            <tr>
                <th>
                    Name
                </th>
                <th>
                    Roll no
                </th>
            </tr>
            <tr>
                <td>
                    Sanjay
                </td>
                <td>
                    123
                </td>
            </tr>
            <tr>
                <td>
                    Sandeep
                </td>
                <td>
                    456
                </td>
            </tr>

        </table>
        <hr>
        <h2>Expploring the Cell padding and cell spacing</h2>
        <table border ="1" cellspacing ="10" cellpadding="10">
            <tr>
                <th>
                    Name
                </th>
                <th>
                    Roll no
                </th>
            </tr>
            <tr>
                <td>
                    Sanjay
                </td>
                <td>
                    123
                </td>
            </tr>
            <tr>
                <td>
                    Sandeep
                </td>
                <td>
                    456
                </td>
            </tr>
            </table>
            <hr>
            <h2>Exploring colspan and rowspan</h2>
            <table border="1" cellspacing ="10" cellpadding="10">
                <tr>
                    <th>
                        Name
                    </th>
                    <th>
                        Roll no
                    </th>
                    <th>
                        Class
                    </th>
                </tr>
                <tr>
                    <td>
                        Sanjay
                    </td>
                    <td>
                        123
                    </td>
                    <td rowspan="2">
                        10th
                    </td>
                </tr>
                <tr>
                    <td colspan="2">
                        Sandeep
                    </td>
                </tr>
                </table>
                <hr>
    </body>
</html>
