<!DOCTYPE html>
<html>
<head>
<style>
.box {
    width: 300px;
    height: 200px;
    padding: 20px;
    margin: 50px auto;
    border: 3px solid blue;
    border-radius: 10px;
    outline: 2px dashed red;
    outline-offset: 5px;
    box-shadow: 5px 5px 15px gray;
    background-color: lightblue;
}
</style>
</head>
<body>
<div class="box">
    CSS Box Model Example
</div>
</body>
</html>
