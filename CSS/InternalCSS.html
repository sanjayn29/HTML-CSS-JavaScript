<!DOCTYPE html>
<html>
    <head>
        <title>Internal Css</title>
        <style>
            #head1 {
                color: red;
            }
            .div1 {
                background-color: rgb(62, 230, 230);
            }
            p{
                color: rgb(86, 237, 86);
            }
        </style>
    </head>
    <body>
        <H1 id="head1">Internal CSS</H1>
        <div class="div1">
            <p>This is an example of internal CSS.</p>
            <p>It allows you to apply styles to specific elements on the page.</p>
        </div>
        <p>Directly style with element</p>
    </body>
</html>
