<!DOCTYPE html>
<html>
<head>
<style>
h1 {
    color: blue;
    text-align: center;
    text-transform: uppercase;
    text-decoration: underline;
    letter-spacing: 3px;
    text-shadow: 2px 2px 5px gray;
}

p {
    line-height: 1.8;
    word-spacing: 5px;
    text-indent: 40px;
    text-align: justify;
}
</style>
</head>
<body>
<h1>CSS Text Styling</h1>
<p>
CSS provides many properties to style text and improve readability.
</p>
</body>
</html>
