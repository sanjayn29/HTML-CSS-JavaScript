<!DOCTYPE html>
<html>

<head>

<style>

/* Descendant */

div p {
    color: blue;
}

/* Child */

section > h2 {
    color: red;
}

/* Next Sibling */

h1 + p {
    background-color: yellow;
}

/* Subsequent Sibling */

h3 ~ p {
    font-size: 20px;
}

</style>

</head>

<body>

<div>

    <p>Descendant Paragraph</p>

</div>

<section>

    <h2>Direct Child Heading</h2>

</section>

<h1>Main Heading</h1>

<p>Immediate Sibling</p>

<h3>Subheading</h3>

<p>Sibling 1</p>

<p>Sibling 2</p>

</body>

</html>
